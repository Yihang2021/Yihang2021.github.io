# 将 React/Vite 静态内容部署到 GitHub Pages 的自动化工作流
name: Deploy static content to Pages

on:
  # 监听 main 分支的 push 事件（包括直接在网页上修改并保存）
  push:
    branches: ["main"]

  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 设置权限以允许发布到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 保证同一时间只有一个部署任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 将打包生成的 dist 目录上传为待发布产物
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4